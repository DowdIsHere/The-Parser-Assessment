<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Parser Profile™</title>
  <meta name="description" content="Sign in to your Parser Profile™ account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Design ported from The Cognition Block — dark-first, electric-blue accent. */
    :root, html.light {
      --accent:#2657E8; --accent-strong:#1C46C9; --accent-bright:#3B6BFF;
      --accent-soft:rgba(38,87,232,0.10); --accent-line:rgba(38,87,232,0.22);
      --text-primary:#0E1525; --text-secondary:#3F4A63; --text-muted:#6B768F;
      --bg-page:#EDF0F6; --bg-card:#FFFFFF; --bg-inset:#F3F5FA;
      --border:rgba(14,21,37,0.08); --border-strong:rgba(14,21,37,0.15);
      --ring-highlight:inset 0 1px 0 rgba(255,255,255,0.65);
      --shadow-lg:0 24px 50px -18px rgba(16,24,40,0.22);
      --accent-glow:0 8px 22px -8px rgba(38,87,232,0.45);
      --status-compromised-bg:#FDECEC; --status-compromised-text:#D23A3A;
      --status-preserved-bg:#E8F8F0; --status-preserved-text:#0E9466;
      --focus-ring:0 0 0 3px rgba(38,87,232,0.22);
      --font-display:'Source Serif 4',Georgia,serif;
      --font-ui:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
      --font-mono:'IBM Plex Mono',ui-monospace,monospace;
      --r-input:12px; --r-btn:12px; --r-panel:20px;
      --ambient:radial-gradient(60rem 40rem at 12% -8%, rgba(38,87,232,0.06), transparent 60%),
                radial-gradient(50rem 36rem at 100% 0%, rgba(124,58,237,0.05), transparent 55%);
      color-scheme:light;
    }
    @media (prefers-color-scheme: dark){
      :root:not(.light){
        --accent:#5B86FF; --accent-strong:#7AA0FF; --accent-bright:#88AAFF;
        --accent-soft:rgba(91,134,255,0.14); --accent-line:rgba(91,134,255,0.30);
        --text-primary:#EAEDF5; --text-secondary:#A6B0C8; --text-muted:#717B96;
        --bg-page:#070A12; --bg-card:#11151F; --bg-inset:#0B0F18;
        --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.15);
        --ring-highlight:inset 0 1px 0 rgba(255,255,255,0.07);
        --shadow-lg:0 28px 64px -22px rgba(0,0,0,0.75);
        --accent-glow:0 8px 26px -8px rgba(91,134,255,0.45);
        --status-compromised-bg:rgba(248,113,113,0.14); --status-compromised-text:#FB8585;
        --status-preserved-bg:rgba(59,213,146,0.13); --status-preserved-text:#3BD592;
        --focus-ring:0 0 0 3px rgba(91,134,255,0.30);
        --ambient:radial-gradient(64rem 44rem at 8% -10%, rgba(91,134,255,0.10), transparent 60%),
                  radial-gradient(52rem 40rem at 102% -4%, rgba(124,58,237,0.09), transparent 58%);
        color-scheme:dark;
      }
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--font-ui);background:var(--bg-page);color:var(--text-primary);min-height:100dvh;line-height:1.6;letter-spacing:-0.005em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:var(--ambient);}
    .auth-page{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:24px;position:relative;overflow:hidden;z-index:1;}
    .auth-page::before{content:'';position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(48rem 36rem at 50% -10%, var(--accent-soft), transparent 60%),
                 radial-gradient(40rem 30rem at 90% 110%, rgba(124,58,237,0.12), transparent 60%);}
    .auth-card{position:relative;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-panel);padding:44px 38px;width:100%;max-width:432px;box-shadow:var(--ring-highlight), var(--shadow-lg);}
    .auth-logo{font-family:var(--font-display);font-size:1.4rem;font-weight:700;letter-spacing:-0.025em;color:var(--text-primary);text-align:center;margin-bottom:4px;}
    .auth-logo-sub{font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-muted);text-align:center;margin-bottom:34px;}
    .auth-title{font-family:var(--font-display);font-size:1.55rem;font-weight:700;letter-spacing:-0.025em;color:var(--text-primary);text-align:center;margin-bottom:26px;}
    .auth-error{background:var(--status-compromised-bg);color:var(--status-compromised-text);padding:11px 14px;border-radius:var(--r-input);font-size:0.85rem;font-weight:500;margin-bottom:16px;text-align:center;}
    .auth-form{display:flex;flex-direction:column;gap:16px;}
    .auth-field{display:flex;flex-direction:column;gap:7px;}
    label{font-family:var(--font-ui);font-size:0.82rem;font-weight:600;letter-spacing:-0.005em;color:var(--text-secondary);}
    input{background:var(--bg-inset);border:1px solid var(--border);border-radius:var(--r-input);color:var(--text-primary);font-family:var(--font-ui);font-size:0.9rem;padding:12px 15px;width:100%;}
    input:focus{outline:none;border-color:var(--accent);box-shadow:var(--focus-ring);background:var(--bg-card);}
    input::placeholder{color:var(--text-muted);opacity:1;}
    .btn{font-family:var(--font-ui);padding:10px 20px;border-radius:var(--r-btn);font-size:0.875rem;font-weight:700;letter-spacing:-0.01em;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;text-decoration:none;transition:transform .16s cubic-bezier(0.16,1,0.3,1), box-shadow .26s cubic-bezier(0.16,1,0.3,1);}
    .btn-primary{background:linear-gradient(180deg,var(--accent-bright),var(--accent));color:#fff;box-shadow:var(--accent-glow),inset 0 1px 0 rgba(255,255,255,0.25);}
    .btn-primary:hover{transform:translateY(-1px);}
    .btn-primary:active{transform:translateY(0) scale(0.98);}
    .btn-primary:disabled{opacity:0.55;cursor:not-allowed;transform:none;box-shadow:none;}
    .btn-secondary{background:var(--bg-inset);color:var(--text-primary);border:1px solid var(--border);}
    .btn-secondary:hover{background:var(--bg-card);border-color:var(--border-strong);transform:translateY(-1px);}
    .auth-submit{width:100%;margin-top:8px;padding:13px 20px;font-size:0.92rem;}
    .auth-switch{text-align:center;margin-top:22px;font-size:0.86rem;color:var(--text-muted);}
    .auth-switch a{color:var(--accent);text-decoration:none;font-weight:600;cursor:pointer;}
    .auth-switch a:hover{text-decoration:underline;}
    .auth-success{text-align:center;}
    .auth-success .tick{width:54px;height:54px;border-radius:999px;background:var(--status-preserved-bg);color:var(--status-preserved-text);display:inline-flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;margin-bottom:18px;}
    .auth-actions{display:flex;flex-direction:column;gap:12px;margin-top:8px;}
    .muted{color:var(--text-muted);font-size:0.92rem;}
    .hidden{display:none !important;}
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Parser Profile™</div>
      <div class="auth-logo-sub">Cognition Blocks Intelligence</div>

      <!-- AUTH FORM -->
      <div id="formWrap">
        <h1 class="auth-title" id="authTitle">Sign In</h1>
        <div class="auth-error hidden" id="authError"></div>
        <form class="auth-form" id="authForm" novalidate>
          <div class="auth-field hidden" id="fieldFirst">
            <label for="firstName">First name</label>
            <input id="firstName" name="firstName" type="text" autocomplete="given-name" placeholder="First name">
          </div>
          <div class="auth-field hidden" id="fieldLast">
            <label for="lastName">Last name</label>
            <input id="lastName" name="lastName" type="text" autocomplete="family-name" placeholder="Last name (optional)">
          </div>
          <div class="auth-field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
          </div>
          <div class="auth-field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Your password" required>
          </div>
          <button type="submit" class="btn btn-primary auth-submit" id="submitBtn">Sign In</button>
        </form>
        <p class="auth-switch" id="switchLine">Don't have an account? <a id="switchLink">Create one</a></p>
      </div>

      <!-- SIGNED-IN STATE -->
      <div id="signedIn" class="auth-success hidden">
        <div class="tick">✓</div>
        <h1 class="auth-title" id="signedInTitle" style="margin-bottom:10px;">You're signed in</h1>
        <p class="muted" id="signedInMsg" style="margin-bottom:22px;"></p>
        <div class="auth-actions">
          <a class="btn btn-primary" href="/assessment.html">Take the Assessment</a>
          <a class="btn btn-secondary" href="/index.html">Back to the 27 Parsers</a>
          <p class="auth-switch" style="margin-top:6px;"><a id="signOutLink">Sign out</a></p>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function () {
    var mode = 'signin';
    var $ = function (id) { return document.getElementById(id); };
    var form = $('authForm'), err = $('authError'), title = $('authTitle'), submit = $('submitBtn');
    var fFirst = $('fieldFirst'), fLast = $('fieldLast'), pw = $('password'), switchLine = $('switchLine');

    function showError(m) { err.textContent = m; err.classList.remove('hidden'); }
    function clearError() { err.classList.add('hidden'); err.textContent = ''; }

    function bindSwitch() {
      var link = $('switchLink');
      if (link) link.onclick = function () { setMode(mode === 'register' ? 'signin' : 'register'); };
    }

    function setMode(m) {
      mode = m; clearError();
      var reg = (m === 'register');
      title.textContent = reg ? 'Create Account' : 'Sign In';
      submit.textContent = reg ? 'Create Account' : 'Sign In';
      fFirst.classList.toggle('hidden', !reg);
      fLast.classList.toggle('hidden', !reg);
      pw.setAttribute('autocomplete', reg ? 'new-password' : 'current-password');
      pw.placeholder = reg ? 'At least 8 characters' : 'Your password';
      switchLine.innerHTML = reg
        ? "Already have an account? <a id='switchLink'>Sign in</a>"
        : "Don't have an account? <a id='switchLink'>Create one</a>";
      bindSwitch();
    }

    function showSignedIn(user) {
      $('formWrap').classList.add('hidden');
      $('signedIn').classList.remove('hidden');
      if (user && user.firstName) $('signedInTitle').textContent = "You're signed in, " + user.firstName;
      $('signedInMsg').textContent = (user && user.email) ? ('Account: ' + user.email) : 'Your account is active.';
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault(); clearError();
      var email = $('email').value.trim(), password = $('password').value;
      if (!email || !password) { showError('Please enter your email and password.'); return; }
      var body = { email: email, password: password };
      var url = '/api/auth/login';
      if (mode === 'register') {
        var first = $('firstName').value.trim();
        if (!first) { showError('Please enter your first name.'); return; }
        if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
        body.firstName = first; body.lastName = $('lastName').value.trim(); body.role = 'member';
        url = '/api/auth/register';
      }
      submit.disabled = true; var orig = submit.textContent;
      submit.textContent = (mode === 'register') ? 'Creating account…' : 'Signing in…';
      try {
        var res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok || !data.success) {
          showError(data.error || (mode === 'register' ? 'Could not create account.' : 'Sign in failed.'));
          return;
        }
        showSignedIn(data.user);
      } catch (_) {
        showError('Something went wrong. Please try again.');
      } finally {
        submit.disabled = false; submit.textContent = orig;
      }
    });

    document.addEventListener('click', function (e) {
      if (e.target && e.target.id === 'signOutLink') {
        e.preventDefault();
        fetch('/api/auth/logout', { method: 'POST' }).finally(function () { location.reload(); });
      }
    });

    // If already signed in, show that state up front.
    fetch('/api/auth/status').then(function (r) { return r.json(); }).then(function (d) {
      if (d && d.authenticated) showSignedIn(d.user);
    }).catch(function () {});

    bindSwitch();
    setMode('signin');
  })();
  </script>
</body>
</html>
