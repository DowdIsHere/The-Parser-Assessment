<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Parser Profile™</title>
  <meta name="description" content="Your saved Parser Profile™.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Profile reader — ported from The Cognition Block, rethemed to the Parser
       Profile palette (Editorial Luxury — warm cream + gold, light). */
    :root {
      --accent:#9A7B2E; --accent-strong:#8A6D24; --accent-bright:#B8922A;
      --accent-soft:rgba(154,123,46,0.10); --accent-line:rgba(154,123,46,0.24);
      --gold-pale:#D8B45E;
      --text-primary:#1E1813; --text-secondary:#4A3F35; --text-muted:#8A7E6E;
      --bg-page:#FAF7F0; --bg-card:#FFFDF9; --bg-inset:#F2ECE0;
      --border:rgba(60,45,25,0.12); --border-strong:rgba(60,45,25,0.22);
      --ring-highlight:inset 0 1px 0 rgba(255,255,255,0.7);
      --shadow-sm:0 1px 3px rgba(60,40,15,0.06); --shadow-md:0 6px 20px rgba(60,40,15,0.08); --shadow-lg:0 16px 40px rgba(60,40,15,0.12);
      --accent-glow:0 8px 22px -8px rgba(154,123,46,0.40);
      --focus-ring:0 0 0 3px rgba(154,123,46,0.18);
      --hero-grad:linear-gradient(150deg,#211A12 0%,#2E2419 55%,#3A2E1E 100%);
      --font-display:'Cormorant Garamond',Georgia,'Times New Roman',serif;
      --font-ui:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
      --font-mono:'IBM Plex Mono',ui-monospace,monospace;
      --r-input:12px; --r-btn:12px; --r-card:16px; --r-panel:18px;
      color-scheme:light;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--font-ui);background:var(--bg-page);color:var(--text-primary);min-height:100dvh;line-height:1.65;letter-spacing:0.005em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
    body::before{content:'';position:fixed;inset:0;z-index:300;pointer-events:none;opacity:0.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");}

    /* Top bar */
    header{position:sticky;top:0;z-index:100;background:rgba(255,253,249,0.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
    .h-inner{max-width:880px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .wordmark{font-family:var(--font-display);font-size:1.15rem;font-weight:700;color:var(--text-primary);text-decoration:none;letter-spacing:-0.01em;}
    .wordmark span{color:var(--accent);}
    .h-links{display:flex;align-items:center;gap:18px;}
    .h-links a{font-size:0.85rem;font-weight:600;color:var(--text-muted);text-decoration:none;cursor:pointer;}
    .h-links a:hover{color:var(--accent);}

    .wrap{max-width:880px;margin:0 auto;padding:28px 24px 80px;position:relative;z-index:1;}

    /* States */
    .state{text-align:center;padding:80px 24px;}
    .state .icon{font-size:2.2rem;margin-bottom:14px;opacity:0.7;}
    .state h2{font-family:var(--font-display);font-size:1.7rem;font-weight:600;margin-bottom:10px;}
    .state p{color:var(--text-secondary);max-width:44ch;margin:0 auto 24px;}
    .btn{font-family:var(--font-ui);padding:13px 26px;border-radius:var(--r-btn);font-size:0.95rem;font-weight:700;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;transition:transform .18s var(--ease,ease),box-shadow .26s;}
    .btn-primary{background:linear-gradient(180deg,var(--accent-bright),var(--accent));color:#fff;box-shadow:var(--accent-glow),inset 0 1px 0 rgba(255,255,255,0.25);}
    .btn-primary:hover{transform:translateY(-1px);}
    .btn-secondary{background:var(--bg-inset);color:var(--text-primary);border:1px solid var(--border);}

    /* Profile header card */
    .phead{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-panel);overflow:hidden;box-shadow:var(--ring-highlight), var(--shadow-md);margin-bottom:28px;}
    .pcover{height:104px;background:var(--hero-grad);position:relative;}
    .pcover::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%, rgba(184,146,42,0.22) 0%, transparent 60%), radial-gradient(ellipse at 85% 30%, rgba(216,180,94,0.16) 0%, transparent 55%);}
    .pinfo{padding:0 32px 30px;margin-top:-44px;position:relative;}
    .pavatar{width:88px;height:88px;border-radius:999px;background:linear-gradient(140deg,var(--accent-bright),var(--accent-strong));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:2rem;font-weight:700;border:4px solid var(--bg-card);box-shadow:var(--shadow-sm);}
    .pname{font-family:var(--font-display);font-size:1.7rem;font-weight:700;letter-spacing:-0.01em;margin-top:14px;}
    .ptag{display:inline-block;margin-top:8px;font-family:var(--font-mono);font-size:0.66rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--accent-strong);background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:999px;padding:6px 14px;}
    .ptagline{margin-top:14px;color:var(--text-secondary);font-family:var(--font-display);font-style:italic;font-size:1.15rem;line-height:1.5;}

    /* Report sections */
    .section{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-card);padding:30px 30px;box-shadow:var(--shadow-sm);margin-bottom:20px;}
    .eyebrow{font-family:var(--font-mono);font-size:0.66rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--accent-strong);margin-bottom:12px;}
    .section h3{font-family:var(--font-display);font-size:1.5rem;font-weight:600;letter-spacing:-0.01em;margin-bottom:14px;}
    .section p{color:var(--text-secondary);margin-bottom:1em;}
    .section p:last-child{margin-bottom:0;}
    .callout{background:linear-gradient(135deg, var(--accent-soft), rgba(216,180,94,0.10));border:1px solid var(--accent-line);border-radius:var(--r-card);padding:28px 30px;margin-bottom:20px;}
    .callout p{font-family:var(--font-display);font-size:1.4rem;line-height:1.4;color:var(--text-primary);font-style:italic;margin:0;}
    .rcard{background:var(--bg-inset);border:1px solid var(--border);border-radius:var(--r-card);padding:20px 22px;margin-bottom:14px;position:relative;}
    .rcard:last-child{margin-bottom:0;}
    .rcard h4{font-family:var(--font-display);font-size:1.2rem;font-weight:600;margin-bottom:7px;color:var(--text-primary);}
    .rcard p{color:var(--text-secondary);font-size:0.98rem;margin-bottom:0.7em;}
    .rcard p:last-child{margin-bottom:0;}
    .rcard .remedy{color:var(--text-primary);}
    .rcard .remedy strong{color:var(--accent-strong);}
    .cnum{font-family:var(--font-display);font-size:1.1rem;color:var(--accent);font-weight:700;margin-bottom:4px;}
    /* Dimension bars */
    .dim{padding:18px 0;border-top:1px solid var(--border);}
    .dim:first-of-type{border-top:none;padding-top:8px;}
    .dim-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
    .dim-name{font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.16em;color:var(--text-muted);}
    .dim-read{font-family:var(--font-display);font-size:1.25rem;font-weight:600;color:var(--accent-strong);}
    .dim-track{display:flex;align-items:center;gap:12px;}
    .dim-pole{font-size:0.78rem;font-weight:600;color:var(--text-muted);width:64px;flex-shrink:0;}
    .dim-pole:last-of-type{text-align:right;}
    .dim-rail{position:relative;flex:1;height:6px;border-radius:999px;background:var(--bg-inset);border:1px solid var(--border);}
    .dim-marker{position:absolute;top:50%;width:16px;height:16px;border-radius:999px;background:linear-gradient(140deg,var(--accent-bright),var(--accent-strong));border:2px solid var(--bg-card);box-shadow:var(--shadow-sm);transform:translate(-50%,-50%);}
    .dim-copy{color:var(--text-secondary);font-size:0.95rem;margin:12px 0 0;}
    .loading{text-align:center;color:var(--text-muted);padding:80px 24px;font-family:var(--font-mono);font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;}
    .hidden{display:none !important;}
  
    /* ── BRAND MARK ──
       27parser.png is a transparent horizontal lockup whose artwork occupies
       only the middle of its canvas (ink 993x363 at offset 193,294 of
       1536x1024). Sizing the image directly renders the mark at ~35% of the
       height asked for, so it is cropped to its ink box here. Set --w to the
       desired mark width; the asset itself is never modified. */
    .logo { display: inline-flex; align-items: center; flex-direction: row; gap: 0; text-decoration: none; }
    .mark {
      --ink-w: 993; --ink-h: 363; --ink-x: 193; --ink-y: 294; --canvas-w: 1536;
      width: var(--w); flex: none;
      height: calc(var(--w) * var(--ink-h) / var(--ink-w));
      background-image: url('/27parser.png');
      background-repeat: no-repeat;
      background-size: calc(var(--w) * var(--canvas-w) / var(--ink-w)) auto;
      background-position:
        calc(-1 * var(--w) * var(--ink-x) / var(--ink-w))
        calc(-1 * var(--w) * var(--ink-y) / var(--ink-w));
    }
    .logo .mark { --w: 93px; }
  </style>
</head>
<body>
  <header>
    <div class="h-inner">
      <a href="/index.html" class="logo">
        <span class="mark" role="img" aria-label="27Parser™"></span>
      </a>
      <div class="h-links">
        <a href="/index.html">The 27</a>
        <a id="signOutLink">Sign out</a>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="loading" id="loading">Loading your profile…</div>

    <!-- No profile yet -->
    <div class="state hidden" id="emptyState">
      <div class="icon">✦</div>
      <h2>No profile saved yet</h2>
      <p>Once you complete the full Parser Profile™ assessment, it lives here for you to revisit anytime.</p>
      <a class="btn btn-primary" href="/assessment.html">Take the Assessment</a>
    </div>

    <!-- The profile -->
    <div class="hidden" id="profileView"></div>
  </div>

  <script>
    // Self-contained profile reader. No external module graph — everything it
    // needs to render a substantive page comes from /api/profile/me and the
    // definitional axis copy below, so it never collapses to an empty state
    // when a content file fails to load.
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    function initials(first, last, email) {
      const a = (first || '').trim(), b = (last || '').trim();
      if (a || b) return ((a[0] || '') + (b[0] || '')).toUpperCase() || (email || '?')[0].toUpperCase();
      return (email || '?')[0].toUpperCase();
    }

    // The three Parser dimensions. Each pole has a one-line, definitional read —
    // grounded in the framework itself, not invented profile-specific claims.
    const AXES = [
      {
        key: 'spatial', label: 'Spatial', low: 'Concrete', high: 'Abstract',
        copy: {
          Concrete: 'You process through detail and what is literally in front of you — grounded in the tangible and the real.',
          Balanced: 'You move between concrete detail and the big picture, drawing on whichever the moment needs.',
          Abstract: 'You process through patterns and the big picture — reading meaning and connection over literal detail.'
        }
      },
      {
        key: 'temporal', label: 'Temporal', low: 'Past', high: 'Future',
        copy: {
          Past: 'You orient toward what has already happened — memory, precedent, and what has been proven before.',
          Present: 'You orient toward the present — what is happening now, rather than what was or what could be.',
          Future: 'You orient toward what is coming — possibility, planning, and where things are heading.'
        }
      },
      {
        key: 'reference', label: 'Reference', low: 'Other', high: 'Self',
        copy: {
          Other: 'You check against the people around you — attuned to the group and how everyone is doing.',
          Balanced: 'You weigh your own read and the group’s read together before you land.',
          Self: 'You check against your own internal sense — trusting your own judgment over outside input.'
        }
      }
    ];

    function bucket(key, v) {
      if (key === 'temporal') return v < 33 ? 'Past' : v > 66 ? 'Future' : 'Present';
      if (key === 'spatial')  return v < 33 ? 'Concrete' : v > 66 ? 'Abstract' : 'Balanced';
      return v < 33 ? 'Other' : v > 66 ? 'Self' : 'Balanced'; // reference
    }

    function dimensionBar(axis, value) {
      const v = Math.max(0, Math.min(100, Number(value) || 0));
      const lab = bucket(axis.key, v);
      return `<div class="dim">
        <div class="dim-top">
          <span class="dim-name">${esc(axis.label)}</span>
          <span class="dim-read">${esc(lab)}</span>
        </div>
        <div class="dim-track">
          <span class="dim-pole">${esc(axis.low)}</span>
          <div class="dim-rail"><span class="dim-marker" style="left:${v}%"></span></div>
          <span class="dim-pole">${esc(axis.high)}</span>
        </div>
        <p class="dim-copy">${esc(axis.copy[lab] || '')}</p>
      </div>`;
    }

    function render(user, saved) {
      const name = [user.firstName, user.lastName].filter(Boolean).join(' ') || (user.email || 'Your Profile');
      const archetype = saved.profileName || 'Your Parser';
      const scores = saved.scores || {};
      // Build coordinates from scores when a saved code isn't present.
      const code = saved.profileCode ||
        AXES.map(a => bucket(a.key, Number(scores[a.key]) || 0)).join(' • ');

      let html = '';

      // Header card
      html += `<div class="phead">
        <div class="pcover"></div>
        <div class="pinfo">
          <div class="pavatar">${esc(initials(user.firstName, user.lastName, user.email))}</div>
          <div class="pname">${esc(name)}</div>
          <div class="ptag">${esc(archetype)}${code ? ' · ' + esc(code) : ''}</div>
        </div>
      </div>`;

      // Dimensions — always renders from saved scores
      if (scores && (scores.spatial != null || scores.temporal != null || scores.reference != null)) {
        const bars = AXES.map(a => dimensionBar(a, scores[a.key])).join('');
        html += `<div class="section">
          <div class="eyebrow">Your Architecture</div>
          <h3>How your mind is oriented</h3>
          <p>Every Parser sits somewhere along three dimensions. Here is where yours land.</p>
          ${bars}
        </div>`;
      }

      // Full report note
      html += `<div class="section">
        <div class="eyebrow">Your Full Report</div>
        <h3>The complete written profile</h3>
        <p>Your full <strong>${esc(archetype)}</strong> report — strengths, how you learn and communicate, your blind spots, and the careers your architecture is built for — was delivered to your email when you completed the assessment.</p>
        <p>Want to revisit or update where you land? You can retake the assessment anytime.</p>
        <a class="btn btn-secondary" href="/assessment.html" style="margin-top:6px;">Retake the Assessment</a>
      </div>`;

      $('profileView').innerHTML = html;
    }

    $('signOutLink').addEventListener('click', function (e) {
      e.preventDefault();
      fetch('/api/auth/logout', { method: 'POST' }).finally(() => { location.href = '/signin.html'; });
    });

    (async function () {
      let data;
      try {
        const res = await fetch('/api/profile/me');
        if (res.status === 401) { location.href = '/signin.html'; return; }
        data = await res.json();
      } catch (_) {
        location.href = '/signin.html'; return;
      }
      $('loading').classList.add('hidden');

      if (!data || !data.authenticated) { location.href = '/signin.html'; return; }

      if (!data.profile || !data.profile.profileName) {
        $('emptyState').classList.remove('hidden');
        return;
      }

      $('profileView').classList.remove('hidden');
      render(data.user, data.profile);
    })();
  </script>
</body>
</html>
