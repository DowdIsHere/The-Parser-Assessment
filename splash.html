<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parser Profile™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-900: #0C2340;
            --blue-700: #1B3A5C;
            --blue-500: #2563EB;
            --blue-400: #3B82F6;
            --slate-900: #1A1A2E;
            --slate-700: #334155;
            --slate-500: #64748B;
            --slate-300: #CBD5E1;
            --slate-100: #F1F5F9;
            --white: #FFFFFF;
            --red-600: #DC2626;
            --bg-page: #F7F8FA;
            --bg-card: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-secondary: #334155;
            --text-muted: #64748B;
            --border: rgba(0,0,0,0.08);
            --shadow-md: 0 8px 28px rgba(12,35,64,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'IBM Plex Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #0C2340 0%, #1B3A5C 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .brand {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--slate-900);
            margin-bottom: 4px;
        }
        .brand span { color: var(--blue-500); }
        .tag {
            font-family: 'IBM Plex Mono', monospace;
            color: var(--slate-500);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            margin-bottom: 32px;
        }
        .headline {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.7rem;
            line-height: 1.3;
            font-weight: 700;
            color: var(--slate-900);
            margin-bottom: 12px;
        }
        .subhead {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.1rem;
            line-height: 1.5;
            color: var(--text-secondary);
            margin-bottom: 36px;
        }
        .divider {
            height: 1px;
            background: var(--border);
            margin: 0 0 28px 0;
        }
        .form-label {
            display: block;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 600;
            color: var(--slate-500);
            margin-bottom: 10px;
            text-align: left;
        }
        input[type="password"] {
            width: 100%;
            padding: 13px 14px;
            border: 1.5px solid var(--slate-300);
            border-radius: 10px;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text-primary);
            background: var(--white);
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: var(--blue-500);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }
        button {
            width: 100%;
            margin-top: 16px;
            padding: 13px 16px;
            background: var(--blue-500);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.05s;
        }
        button:hover { background: var(--blue-700); }
        button:active { transform: translateY(1px); }
        button:disabled { background: var(--slate-300); cursor: not-allowed; }
        .error {
            margin-top: 14px;
            color: var(--red-600);
            font-size: 0.85rem;
            min-height: 1.2em;
        }
        footer {
            position: fixed;
            bottom: 16px;
            left: 0; right: 0;
            text-align: center;
            color: rgba(255,255,255,0.55);
            font-size: 0.72rem;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <main class="card" role="main">
        <div class="brand">Parser <span>Profile™</span></div>
        <div class="tag">Cognition Blocks Intelligence</div>

        <h1 class="headline">The Trial Period Has Ended.</h1>
        <p class="subhead">The Parser Profile Will Return.</p>

        <div class="divider"></div>

        <form id="unlock-form" autocomplete="off">
            <label class="form-label" for="password">Access Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>
            <button id="unlock-btn" type="submit">Enter</button>
            <div id="error" class="error" role="alert" aria-live="polite"></div>
        </form>
    </main>
    <footer>© 2026 Cognition Blocks LLC</footer>

    <script>
        const form = document.getElementById('unlock-form');
        const passwordInput = document.getElementById('password');
        const errorEl = document.getElementById('error');
        const btn = document.getElementById('unlock-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.textContent = '';
            btn.disabled = true;
            btn.textContent = 'Checking…';
            try {
                const res = await fetch('/api/splash-unlock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: passwordInput.value })
                });
                const data = await res.json().catch(() => ({}));
                if (res.ok && data.success) {
                    window.location.href = '/assessment.html';
                    return;
                }
                errorEl.textContent = data.error || 'Incorrect password.';
                passwordInput.select();
            } catch (err) {
                errorEl.textContent = 'Network error. Please try again.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Enter';
            }
        });
    </script>
</body>
</html>
