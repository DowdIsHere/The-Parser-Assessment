<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All 27 Profiles | Parser Profile™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-900: #0C2340;
            --blue-700: #1B3A5C;
            --blue-500: #2563EB;
            --slate-900: #1A1A2E;
            --slate-700: #334155;
            --slate-500: #64748B;
            --slate-300: #CBD5E1;
            --slate-100: #F1F5F9;
            --bg-page: #F7F8FA;
            --bg-card: #FFFFFF;
            --border: rgba(0, 0, 0, 0.08);
            --border-strong: rgba(0, 0, 0, 0.14);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Sans', system-ui, sans-serif;
            background: var(--bg-page);
            color: var(--slate-900);
            min-height: 100vh;
            line-height: 1.6;
            font-size: 16px;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--slate-500); }
        .nav a { color: var(--blue-500); text-decoration: none; }
        .nav a:hover { text-decoration: underline; }
        .hero {
            background: linear-gradient(175deg, var(--blue-900) 0%, var(--blue-700) 60%, #1E4D78 100%);
            border-radius: 16px;
            padding: 56px 32px;
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(37, 99, 235, 0.15) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .hero .eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; color: rgba(255,255,255,0.82); margin-bottom: 12px; position: relative; }
        .hero h1 { font-family: 'Source Serif 4', Georgia, serif; font-size: 2.5rem; font-weight: 600; margin-bottom: 12px; position: relative; }
        .hero p { color: rgba(255,255,255,0.85); max-width: 640px; margin: 0 auto; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card {
            display: block;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow-sm);
            transition: transform 0.12s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }
        .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border-strong); }
        .card .name { font-family: 'Source Serif 4', Georgia, serif; font-size: 1.5rem; font-weight: 700; color: var(--blue-900); margin-bottom: 6px; letter-spacing: 0.02em; }
        .card .code { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--blue-500); margin-bottom: 12px; letter-spacing: 0.05em; }
        .card .tagline { color: var(--slate-700); font-size: 0.92rem; line-height: 1.55; }
        .loading { text-align: center; color: var(--slate-500); padding: 80px 0; }
        @media (max-width: 600px) {
            .hero { padding: 40px 24px; }
            .hero h1 { font-size: 1.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/assessment.html">&larr; Assessment</a>
            <span id="profileCount">27 profiles</span>
        </div>
        <div class="hero">
            <div class="eyebrow">Parser Profile™ Library</div>
            <h1>All 27 Profiles</h1>
            <p>Browse every Parser Profile without taking the assessment. Click any card for the full breakdown.</p>
        </div>
        <div id="grid" class="grid">
            <div class="loading">Loading profiles…</div>
        </div>
    </div>

    <script type="module">
        import { profiles } from '/index.js';

        const grid = document.getElementById('grid');
        const entries = Object.entries(profiles).sort(([a], [b]) => a.localeCompare(b));
        document.getElementById('profileCount').textContent = `${entries.length} profiles`;

        grid.innerHTML = entries.map(([key, p]) => {
            const slug = key.toLowerCase();
            const tagline = (p.tagline || '').replace(/[<>]/g, '');
            const code = (p.code || '').replace(/[<>]/g, '');
            return `
                <a class="card" href="/profile/${slug}">
                    <div class="name">${p.name}</div>
                    <div class="code">${code}</div>
                    <div class="tagline">${tagline}</div>
                </a>`;
        }).join('');
    </script>
</body>
</html>
