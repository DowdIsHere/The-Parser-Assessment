<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Parser Profile™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-900: #0C2340;
            --blue-700: #1B3A5C;
            --blue-500: #2563EB;
            --slate-900: #1A1A2E;
            --slate-700: #334155;
            --slate-500: #64748B;
            --slate-300: #CBD5E1;
            --slate-100: #F1F5F9;
            --bg-page: #F7F8FA;
            --bg-card: #FFFFFF;
            --bg-inset: #F1F5F9;
            --border: rgba(0, 0, 0, 0.08);
            --border-strong: rgba(0, 0, 0, 0.14);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --accent-spatial: #0D9488;
            --accent-temporal: #D97706;
            --accent-reference: #7C3AED;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Sans', system-ui, sans-serif;
            background: var(--bg-page);
            color: var(--slate-900);
            min-height: 100vh;
            line-height: 1.65;
            font-size: 16px;
        }
        .container { max-width: 880px; margin: 0 auto; padding: 32px 24px 80px; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--slate-500); }
        .nav a { color: var(--blue-500); text-decoration: none; }
        .nav a:hover { text-decoration: underline; }
        .results-header {
            text-align: center;
            padding: 56px 32px;
            background: linear-gradient(175deg, var(--blue-900) 0%, var(--blue-700) 60%, #1E4D78 100%);
            border-radius: 16px;
            color: #fff;
            position: relative;
            overflow: hidden;
            margin-bottom: 40px;
        }
        .results-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(37, 99, 235, 0.15) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .results-header .subtitle { color: rgba(255,255,255,0.82); font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; position: relative; }
        .profile-name { font-family: 'Source Serif 4', Georgia, serif; font-size: 3rem; font-weight: 700; color: #fff; margin-bottom: 10px; letter-spacing: 0.02em; position: relative; }
        .profile-code { font-family: 'IBM Plex Mono', monospace; color: rgba(255,255,255,0.75); font-size: 0.9rem; letter-spacing: 0.05em; position: relative; }
        .profile-tagline { color: rgba(255,255,255,0.9); font-style: italic; font-size: 1.05rem; margin-top: 16px; position: relative; }

        .results-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 30px; margin-bottom: 24px; box-shadow: var(--shadow-sm); transition: border-color 0.2s, box-shadow 0.2s; }
        .results-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); }
        .results-card h3 { font-family: 'Source Serif 4', Georgia, serif; font-size: 1.25rem; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; color: var(--slate-900); }
        .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--slate-500); margin-bottom: 8px; }
        .content-section { line-height: 1.7; color: var(--slate-700); font-size: 1rem; }
        .content-section p { margin-bottom: 16px; }
        .content-section p:last-child { margin-bottom: 0; }

        .phrase-highlight {
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.07), rgba(37, 99, 235, 0.05));
            border-left: 4px solid var(--accent-spatial);
            padding: 24px 28px;
            border-radius: 12px;
        }
        .phrase-highlight p { font-family: 'Source Serif 4', Georgia, serif; font-size: 1.15rem; font-style: italic; color: var(--slate-900); margin: 0; line-height: 1.6; }

        .trait-grid { display: grid; gap: 14px; }
        .trait-item { display: flex; gap: 14px; padding: 18px; background: var(--bg-inset); border-radius: 12px; border: 1px solid var(--border); }
        .trait-item .marker { width: 6px; align-self: stretch; background: var(--accent-spatial); border-radius: 3px; flex-shrink: 0; }
        .trait-item .body { flex: 1; }
        .trait-item .title { font-weight: 600; color: var(--slate-900); margin-bottom: 4px; }
        .trait-item .desc { color: var(--slate-700); font-size: 0.95rem; line-height: 1.55; }

        .challenge-item {
            padding: 20px;
            background: var(--bg-inset);
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 14px;
        }
        .challenge-item:last-child { margin-bottom: 0; }
        .challenge-item h4 { font-family: 'Source Serif 4', Georgia, serif; font-size: 1.05rem; color: var(--slate-900); margin-bottom: 8px; }
        .challenge-item .challenge-text { color: var(--slate-700); font-size: 0.95rem; margin-bottom: 10px; line-height: 1.6; }
        .challenge-item .remedy { color: var(--accent-spatial); font-size: 0.95rem; line-height: 1.6; }
        .challenge-item .remedy strong { color: var(--accent-spatial); }

        .error-card { padding: 60px 30px; text-align: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; }
        .error-card h2 { font-family: 'Source Serif 4', Georgia, serif; color: var(--slate-900); margin-bottom: 12px; }
        .error-card p { color: var(--slate-700); margin-bottom: 24px; }
        .btn-primary { display: inline-block; background: var(--blue-500); color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 500; }
        .btn-primary:hover { background: var(--blue-700); }

        @media (max-width: 600px) {
            .profile-name { font-size: 2.1rem; }
            .results-header { padding: 40px 20px; }
            .results-card { padding: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/profiles">&larr; All 27 Profiles</a>
            <a href="/assessment.html">Take the assessment &rarr;</a>
        </div>

        <div id="profileRoot">
            <div class="results-card" style="text-align:center; color: var(--slate-500);">Loading…</div>
        </div>
    </div>

    <script type="module">
        import { getProfileByName } from '/index.js';

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function paragraphs(text) {
            if (!text) return '';
            return text.split(/\n\n+/).map(p => `<p>${escapeHtml(p).replace(/\n/g, '<br>')}</p>`).join('');
        }

        function section(label, heading, bodyHtml) {
            if (!bodyHtml) return '';
            return `
                <div class="results-card">
                    <div class="section-label">${label}</div>
                    <h3>${heading}</h3>
                    ${bodyHtml}
                </div>`;
        }

        function renderError(name) {
            return `
                <div class="error-card">
                    <h2>Profile not found</h2>
                    <p>No profile matches "${escapeHtml(name)}". Try browsing the library.</p>
                    <a class="btn-primary" href="/profiles">Browse all 27 profiles</a>
                </div>`;
        }

        function getSlugFromUrl() {
            // URL pattern: /profile/<slug>  OR  /profile-viewer.html?name=<slug>
            const path = window.location.pathname;
            const m = path.match(/\/profile\/([^/?#]+)/);
            if (m) return decodeURIComponent(m[1]);
            const params = new URLSearchParams(window.location.search);
            return params.get('name') || '';
        }

        function render() {
            const root = document.getElementById('profileRoot');
            const slug = getSlugFromUrl();
            if (!slug) {
                root.innerHTML = renderError('(no name given)');
                return;
            }
            const profile = getProfileByName(slug);
            if (!profile) {
                root.innerHTML = renderError(slug);
                document.title = 'Profile not found | Parser Profile™';
                return;
            }

            document.title = `${profile.name} | Parser Profile™`;

            const header = `
                <div class="results-header">
                    <div class="subtitle">Parser Profile™</div>
                    <h1 class="profile-name">${escapeHtml(profile.name)}</h1>
                    <div class="profile-code">${escapeHtml(profile.code || '')}</div>
                    ${profile.tagline ? `<div class="profile-tagline">${escapeHtml(profile.tagline)}</div>` : ''}
                </div>`;

            const phrase = profile.phrase
                ? `<div class="results-card">
                       <div class="section-label">The Phrase That Hits Home</div>
                       <div class="phrase-highlight"><p>"${escapeHtml(profile.phrase)}"</p></div>
                   </div>`
                : '';

            const overview     = section('Who You Are', '🔮 Overview', `<div class="content-section">${paragraphs(profile.overview)}</div>`);
            const howLearn     = section('Learning Style', '📚 How You Learn Best', `<div class="content-section">${paragraphs(profile.howYouLearn)}</div>`);
            const howCommun    = section('Communication Style', '💬 How You Communicate', `<div class="content-section">${paragraphs(profile.howYouCommunicate)}</div>`);
            const secret       = section('The Secret', '🤫 The Secret You\'ve Carried', `<div class="content-section">${paragraphs(profile.secret)}</div>`);
            const others       = section('Outside View', '🎭 What Others Get Wrong', `<div class="content-section">${paragraphs(profile.whatOthersGetWrong)}</div>`);
            const superpower   = section('Native Gift', '✨ Hidden Superpower', `<div class="content-section">${paragraphs(profile.hiddenSuperpower)}</div>`);
            const blindspot    = section('Cognitive Shadow', '👁️ Blind Spot', `<div class="content-section">${paragraphs(profile.blindSpot)}</div>`);
            const friction     = section('Relational Patterns', '⚡ Friction Patterns', `<div class="content-section">${paragraphs(profile.frictionPatterns)}</div>`);
            const energy       = section('Energy', '🔋 Energy Patterns', `<div class="content-section">${paragraphs(profile.energyPatterns)}</div>`);
            const work         = section('Environment', '🏢 Work Environments', `<div class="content-section">${paragraphs(profile.workEnvironments)}</div>`);
            const blocks       = section('CBI Block Profile', '🧩 Block Indicators', `<div class="content-section">${paragraphs(profile.blockIndicators)}</div>`);

            const strengths = Array.isArray(profile.strengths) && profile.strengths.length
                ? section('What Comes Naturally', '⚡ Cognitive Strengths',
                    `<div class="trait-grid">${profile.strengths.map(s => `
                        <div class="trait-item">
                            <div class="marker"></div>
                            <div class="body">
                                <div class="title">${escapeHtml(s.title || '')}</div>
                                <div class="desc">${escapeHtml(s.description || '')}</div>
                            </div>
                        </div>`).join('')}</div>`)
                : '';

            const challenges = Array.isArray(profile.challenges) && profile.challenges.length
                ? section('Growth Edges', '🎯 Challenges & Remedies',
                    profile.challenges.map(c => `
                        <div class="challenge-item">
                            <h4>${escapeHtml(c.title || '')}</h4>
                            ${c.challenge ? `<p class="challenge-text">${escapeHtml(c.challenge)}</p>` : ''}
                            ${c.remedy ? `<p class="remedy"><strong>Remedy:</strong> ${escapeHtml(c.remedy)}</p>` : ''}
                        </div>`).join(''))
                : '';

            root.innerHTML = [
                header,
                phrase,
                overview,
                strengths,
                howLearn,
                howCommun,
                challenges,
                secret,
                others,
                superpower,
                blindspot,
                friction,
                energy,
                work,
                blocks,
            ].join('');
        }

        render();
    </script>
</body>
</html>
