<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kids Parser Profile™</title>
  <meta name="description" content="Your child's Parser Profile™ report.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent:#9A7B2E; --accent-strong:#8A6D24; --accent-bright:#B8922A;
      --accent-soft:rgba(154,123,46,0.10); --accent-line:rgba(154,123,46,0.24);
      --gold-pale:#D8B45E;
      --text-primary:#1E1813; --text-secondary:#4A3F35; --text-muted:#8A7E6E;
      --bg-page:#FAF7F0; --bg-card:#FFFDF9; --bg-inset:#F2ECE0;
      --border:rgba(60,45,25,0.12); --border-strong:rgba(60,45,25,0.22);
      --ring-highlight:inset 0 1px 0 rgba(255,255,255,0.7);
      --shadow-sm:0 1px 3px rgba(60,40,15,0.06); --shadow-md:0 6px 20px rgba(60,40,15,0.08); --shadow-lg:0 16px 40px rgba(60,40,15,0.12);
      --accent-glow:0 8px 22px -8px rgba(154,123,46,0.40);
      --focus-ring:0 0 0 3px rgba(154,123,46,0.18);
      --hero-grad:linear-gradient(150deg,#211A12 0%,#2E2419 55%,#3A2E1E 100%);
      --font-display:'Cormorant Garamond',Georgia,'Times New Roman',serif;
      --font-ui:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
      --font-mono:'IBM Plex Mono',ui-monospace,monospace;
      --r-input:12px; --r-btn:12px; --r-card:16px; --r-panel:18px;
      color-scheme:light;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--font-ui);background:var(--bg-page);color:var(--text-primary);min-height:100dvh;line-height:1.65;letter-spacing:0.005em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
    body::before{content:'';position:fixed;inset:0;z-index:300;pointer-events:none;opacity:0.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");}

    header{position:sticky;top:0;z-index:100;background:rgba(255,253,249,0.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
    .h-inner{max-width:880px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .wordmark{font-family:var(--font-display);font-size:1.15rem;font-weight:700;color:var(--text-primary);text-decoration:none;letter-spacing:-0.01em;}
    .wordmark span{color:var(--accent);}
    .h-links{display:flex;align-items:center;gap:18px;}
    .h-links a{font-size:0.85rem;font-weight:600;color:var(--text-muted);text-decoration:none;cursor:pointer;}
    .h-links a:hover{color:var(--accent);}

    .wrap{max-width:880px;margin:0 auto;padding:28px 24px 80px;position:relative;z-index:1;}

    .state{text-align:center;padding:80px 24px;}
    .state .icon{font-size:2.2rem;margin-bottom:14px;opacity:0.7;}
    .state h2{font-family:var(--font-display);font-size:1.7rem;font-weight:600;margin-bottom:10px;}
    .state p{color:var(--text-secondary);max-width:44ch;margin:0 auto 24px;}
    .btn{font-family:var(--font-ui);padding:13px 26px;border-radius:var(--r-btn);font-size:0.95rem;font-weight:700;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;transition:transform .18s ease,box-shadow .26s;}
    .btn-primary{background:linear-gradient(180deg,var(--accent-bright),var(--accent));color:#fff;box-shadow:var(--accent-glow),inset 0 1px 0 rgba(255,255,255,0.25);}
    .btn-primary:hover{transform:translateY(-1px);}
    .btn-secondary{background:var(--bg-inset);color:var(--text-primary);border:1px solid var(--border);}

    /* Profile header */
    .phead{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-panel);overflow:hidden;box-shadow:var(--ring-highlight),var(--shadow-md);margin-bottom:28px;}
    .pcover{height:104px;background:var(--hero-grad);position:relative;}
    .pcover::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(184,146,42,0.22) 0%,transparent 60%),radial-gradient(ellipse at 85% 30%,rgba(216,180,94,0.16) 0%,transparent 55%);}
    .pinfo{padding:0 32px 30px;margin-top:-44px;position:relative;}
    .pavatar{width:88px;height:88px;border-radius:999px;background:linear-gradient(140deg,var(--accent-bright),var(--accent-strong));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:2rem;font-weight:700;border:4px solid var(--bg-card);box-shadow:var(--shadow-sm);}
    .pname{font-family:var(--font-display);font-size:1.7rem;font-weight:700;letter-spacing:-0.01em;margin-top:14px;}
    .ptag{display:inline-block;margin-top:8px;font-family:var(--font-mono);font-size:0.66rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--accent-strong);background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:999px;padding:6px 14px;}
    .ptagline{margin-top:14px;color:var(--text-secondary);font-family:var(--font-display);font-style:italic;font-size:1.15rem;line-height:1.5;}

    /* Tabs */
    .tab-bar{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r-btn);overflow:hidden;margin-bottom:24px;background:var(--bg-inset);}
    .tab-btn{flex:1;padding:12px 16px;font-family:var(--font-ui);font-size:0.88rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:background .18s,color .18s;}
    .tab-btn.active{background:var(--bg-card);color:var(--text-primary);box-shadow:var(--shadow-sm);}
    .tab-pane{display:none;}
    .tab-pane.active{display:block;}

    /* Parent sub-toggle */
    .subtab-bar{display:flex;gap:8px;margin-bottom:22px;}
    .subtab-btn{padding:8px 18px;border-radius:999px;font-family:var(--font-ui);font-size:0.84rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg-inset);color:var(--text-muted);transition:background .18s,color .18s,border-color .18s;}
    .subtab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .subtab-pane{display:none;}
    .subtab-pane.active{display:block;}

    /* Content cards */
    .section{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-card);padding:30px;box-shadow:var(--shadow-sm);margin-bottom:20px;}
    .eyebrow{font-family:var(--font-mono);font-size:0.66rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--accent-strong);margin-bottom:12px;}
    .section h3{font-family:var(--font-display);font-size:1.5rem;font-weight:600;letter-spacing:-0.01em;margin-bottom:14px;}
    .section p{color:var(--text-secondary);margin-bottom:1em;}
    .section p:last-child{margin-bottom:0;}
    .callout{background:linear-gradient(135deg,var(--accent-soft),rgba(216,180,94,0.10));border:1px solid var(--accent-line);border-radius:var(--r-card);padding:28px 30px;margin-bottom:20px;}
    .callout p{font-family:var(--font-display);font-size:1.4rem;line-height:1.4;color:var(--text-primary);font-style:italic;margin:0;}
    .rcard{background:var(--bg-inset);border:1px solid var(--border);border-radius:var(--r-card);padding:20px 22px;margin-bottom:14px;}
    .rcard:last-child{margin-bottom:0;}
    .rcard h4{font-family:var(--font-display);font-size:1.2rem;font-weight:600;margin-bottom:7px;color:var(--text-primary);}
    .rcard p{color:var(--text-secondary);font-size:0.98rem;margin-bottom:0;}
    .block-level{display:inline-block;font-family:var(--font-mono);font-size:0.62rem;text-transform:uppercase;letter-spacing:0.12em;padding:3px 10px;border-radius:999px;margin-bottom:8px;}
    .level-strong{background:#E8F4EC;color:#0E7A52;}
    .level-growing{background:#FEF3C7;color:#92400E;}
    .level-developing{background:#FBEAEA;color:#B3261E;}
    .loading{text-align:center;color:var(--text-muted);padding:80px 24px;font-family:var(--font-mono);font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;}
    .hidden{display:none !important;}
  </style>
</head>
<body>
  <header>
    <div class="h-inner">
      <a href="/index.html" class="wordmark">Parser <span>Profile</span>™</a>
      <div class="h-links">
        <a href="/kids-assessment.html">Kids Assessment</a>
        <a id="signOutLink">Sign out</a>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="loading" id="loading">Loading profile…</div>

    <div class="state hidden" id="emptyState">
      <div class="icon">✦</div>
      <h2>No kids profile yet</h2>
      <p>Once the kids assessment is complete, the full report will live here.</p>
      <a class="btn btn-primary" href="/kids-assessment.html">Take the Kids Assessment</a>
    </div>

    <div class="hidden" id="profileView"></div>
  </div>

  <script type="module">
    import { actualizedKidsProfile } from './actualizedkids.js';
    import { altruisticKidsProfile } from './altruistickids.js';
    import { attunedKidsProfile } from './attunedkids.js';
    import { centeredKidsProfile } from './centeredkids.js';
    import { coherentKidsProfile } from './coherentkids.js';
    import { collaborativeKidsProfile } from './collaborativekids.js';
    import { embodiedKidsProfile } from './embodiedkids.js';
    import { empatheticKidsProfile } from './empathetickids.js';
    import { equanimousKidsProfile } from './equanimouskids.js';
    import { foresightedKidsProfile } from './foresightedkids.js';
    import { groundedKidsProfile } from './groundedkids.js';
    import { harmoniousKidsProfile } from './harmoniouskids.js';
    import { idealizedKidsProfile } from './idealizedkids.js';
    import { integratedKidsProfile } from './integratedkids.js';
    import { intentionalKidsProfile } from './intentionalkids.js';
    import { introspectiveKidsProfile } from './introspectivekids.js';
    import { intuitiveKidsProfile } from './intuitivekids.js';
    import { legacyKidsProfile } from './legacykids.js';
    import { mindfulKidsProfile } from './mindfulkids.js';
    import { reconciledKidsProfile } from './reconciledkids.js';
    import { reflectiveKidsProfile } from './reflectivekids.js';
    import { reliableKidsProfile } from './reliablekids.js';
    import { resilientKidsProfile } from './resilientkids.js';
    import { seasonedKidsProfile } from './seasonedkids.js';
    import { sentimentalKidsProfile } from './sentimentalkids.js';
    import { sharpKidsProfile } from './sharpkids.js';
    import { visionaryKidsProfile } from './visionarykids.js';

    const kidsProfiles = {
      Actualized: actualizedKidsProfile, Altruistic: altruisticKidsProfile,
      Attuned: attunedKidsProfile, Centered: centeredKidsProfile,
      Coherent: coherentKidsProfile, Collaborative: collaborativeKidsProfile,
      Embodied: embodiedKidsProfile, Empathetic: empatheticKidsProfile,
      Equanimous: equanimousKidsProfile, Foresighted: foresightedKidsProfile,
      Grounded: groundedKidsProfile, Harmonious: harmoniousKidsProfile,
      Idealized: idealizedKidsProfile, Integrated: integratedKidsProfile,
      Intentional: intentionalKidsProfile, Introspective: introspectiveKidsProfile,
      Intuitive: intuitiveKidsProfile, Legacy: legacyKidsProfile,
      Mindful: mindfulKidsProfile, Reconciled: reconciledKidsProfile,
      Reflective: reflectiveKidsProfile, Reliable: reliableKidsProfile,
      Resilient: resilientKidsProfile, Seasoned: seasonedKidsProfile,
      Sentimental: sentimentalKidsProfile, Sharp: sharpKidsProfile,
      Visionary: visionaryKidsProfile
    };

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const prose = (t) => !t ? '' : esc(t).split('\n\n').map(p => '<p>' + p.replace(/\n/g, '<br>') + '</p>').join('');

    function section(eyebrow, title, html) {
      if (!html) return '';
      return `<div class="section"><div class="eyebrow">${esc(eyebrow)}</div><h3>${esc(title)}</h3>${html}</div>`;
    }

    function renderKidTab(profile, childName) {
      let html = '';
      html += prose(profile.overview);
      if (profile.tagline) html += `<div class="callout"><p>${esc(profile.tagline)}</p></div>`;
      if (Array.isArray(profile.superpowers) && profile.superpowers.length) {
        const cards = profile.superpowers.map(s => `<div class="rcard"><h4>${esc(s.title)}</h4><p>${esc(s.description)}</p></div>`).join('');
        html += section('Superpowers', 'What your mind does well', cards);
      }
      html += section('How You Learn', 'The way knowledge sticks for you', prose(profile.howYouLearn));
      html += section('The Basics', 'On the stuff school loves', prose(profile.learningBasics));
      html += section('Energy Patterns', 'What fills you up and wears you out', prose(profile.energyPatterns));
      html += section('Friction Patterns', 'Where you bump into others', prose(profile.frictionPatterns));
      if (Array.isArray(profile.watchOuts) && profile.watchOuts.length) {
        const cards = profile.watchOuts.map(w => `<div class="rcard"><h4>${esc(w.title)}</h4><p>${esc(w.tip)}</p></div>`).join('');
        html += section('Watch Outs', 'A few things to grow into', cards);
      }
      html += section('Your Thinking Blocks', 'Where your brain is strong and where it\'s growing', prose(profile.blockIndicators));
      html += section(profile.ageStage === 'teens' ? 'Growing Up' : 'When You Grow Up', 'Where this wiring leads', prose(profile.whenYouGrowUp));
      return html;
    }

    // slugify a label to use as an element id ("For Dad" → "for-dad")
    function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

    function renderParentTab(profile, childName) {
      let html = '';

      // Shared note for all caregivers (shown above individual sections)
      const sharedNote = profile.forAllParents || profile.forBothParents || null;
      if (sharedNote) {
        const sharedTitle = (Array.isArray(profile.forParents) && profile.forParents.length === 1)
          ? 'A Note for You'
          : 'For All of You';
        html += section('', sharedTitle, prose(sharedNote));
      }

      // Individual caregiver notes — rendered as tabs if >1, inline if exactly 1
      const parents = Array.isArray(profile.forParents) ? profile.forParents.filter(p => p && p.note) : [];
      if (parents.length === 1) {
        html += section('Parent Note', parents[0].label, prose(parents[0].note));
      } else if (parents.length > 1) {
        const subtabs = parents.map((p, i) =>
          `<button class="subtab-btn${i === 0 ? ' active' : ''}" data-sub="${slugify(p.label)}">${esc(p.label)}</button>`
        ).join('');
        const panes = parents.map((p, i) =>
          `<div class="subtab-pane${i === 0 ? ' active' : ''}" id="sub-${slugify(p.label)}">${prose(p.note)}</div>`
        ).join('');
        const sectionTitle = parents.length === 2 ? 'A Note for Each of You' : 'A Note for Each Caregiver';
        html += `<div class="section"><div class="eyebrow">Parent Notes</div><h3>${sectionTitle}</h3><div class="subtab-bar">${subtabs}</div>${panes}</div>`;
      }

      // Per-block breakdown — tabs mirror the forParents labels
      if (Array.isArray(profile.blockPattern) && profile.blockPattern.length) {
        const levelClass = { strong: 'level-strong', growing: 'level-growing', developing: 'level-developing' };
        const levelLabel = { strong: 'Strong', growing: 'Growing', developing: 'Developing' };
        const cards = profile.blockPattern.map(b => {
          const cls = levelClass[b.level] || 'level-growing';
          const lbl = levelLabel[b.level] || b.level;
          const notes = Array.isArray(b.parentNotes) ? b.parentNotes.filter(n => n && n.note) : [];
          let notesHtml = '';
          if (notes.length === 1) {
            notesHtml = `<p>${esc(notes[0].note)}</p>`;
          } else if (notes.length > 1) {
            const bid = 'block-' + slugify(b.block);
            const stabs = notes.map((n, i) =>
              `<button class="subtab-btn${i === 0 ? ' active' : ''}" data-sub="${bid}-${slugify(n.label)}">${esc(n.label)}</button>`
            ).join('');
            const spanes = notes.map((n, i) =>
              `<div class="subtab-pane${i === 0 ? ' active' : ''}" id="sub-${bid}-${slugify(n.label)}"><p>${esc(n.note)}</p></div>`
            ).join('');
            notesHtml = `<div class="subtab-bar" style="margin-top:10px;">${stabs}</div>${spanes}`;
          }
          return `<div class="rcard">
            <span class="block-level ${cls}">${lbl}</span>
            <h4>${esc(b.block)}</h4>
            ${notesHtml}
          </div>`;
        }).join('');
        const blockTitle = parents.length > 0 ? 'What each block means — and what you can do' : 'Cognitive Block Breakdown';
        html += section('Block Breakdown', blockTitle, cards);
      }

      return html;
    }

    function render(user, saved, profile, childName) {
      const archetype = (profile && profile.name) ? profile.name : (saved.profileName || 'Parser Profile');
      const code = (profile && profile.code) ? profile.code : (saved.profileCode || '');
      const displayName = childName || 'Your Child';
      const initLetter = displayName[0].toUpperCase();

      let html = '';

      // Header
      html += `<div class="phead">
        <div class="pcover"></div>
        <div class="pinfo">
          <div class="pavatar">${esc(initLetter)}</div>
          <div class="pname">${esc(displayName)}</div>
          <div class="ptag">${esc(archetype)}${code ? ' · ' + esc(code) : ''}</div>
          ${profile && profile.tagline ? `<div class="ptagline">"${esc(profile.tagline)}"</div>` : ''}
        </div>
      </div>`;

      // Tab bar
      html += `<div class="tab-bar">
        <button class="tab-btn active" data-tab="child">For ${esc(displayName)}</button>
        <button class="tab-btn" data-tab="parents">For Parents</button>
      </div>`;

      if (!profile) {
        html += `<div class="tab-pane active" id="tab-child">
          <div class="section"><p>Profile saved as <strong>${esc(archetype)}</strong>. The full written report for this profile isn't available to display here yet.</p></div>
        </div>
        <div class="tab-pane" id="tab-parents"></div>`;
      } else {
        html += `<div class="tab-pane active" id="tab-child">${renderKidTab(profile, displayName)}</div>`;
        html += `<div class="tab-pane" id="tab-parents">${renderParentTab(profile, displayName)}</div>`;
      }

      $('profileView').innerHTML = html;

      // Wire up tabs
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
      });

      // Wire up all sub-tab toggles generically
      document.querySelectorAll('.subtab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const bar = btn.closest('.subtab-bar');
          bar.querySelectorAll('.subtab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          // Panes are siblings of the bar inside the same parent container (section or rcard)
          const container = bar.parentElement;
          container.querySelectorAll('.subtab-pane').forEach(p => p.classList.remove('active'));
          const target = document.getElementById('sub-' + btn.dataset.sub);
          if (target) target.classList.add('active');
        });
      });
    }

    $('signOutLink').addEventListener('click', e => {
      e.preventDefault();
      fetch('/api/auth/logout', { method: 'POST' }).finally(() => { location.href = '/signin.html'; });
    });

    (async function () {
      let data;
      try {
        const res = await fetch('/api/profile/kids');
        if (res.status === 401) { location.href = '/signin.html'; return; }
        data = await res.json();
      } catch (_) { location.href = '/signin.html'; return; }

      $('loading').classList.add('hidden');
      if (!data || !data.authenticated) { location.href = '/signin.html'; return; }

      if (!data.profile || !data.profile.profileName) {
        $('emptyState').classList.remove('hidden');
        return;
      }

      const saved = data.profile;
      const profile = kidsProfiles[saved.profileName] || null;

      $('profileView').classList.remove('hidden');
      render(data.user, saved, profile, saved.childName);
    })();
  </script>
</body>
</html>
